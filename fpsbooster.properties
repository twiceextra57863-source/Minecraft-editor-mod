# Visual Quality Presets
quality.preset=ultra  # ultra/high/balanced (ultra = 100% vanilla quality)
render.scale=1.0      # NO scaling - full resolution
antialiasing=4        # MSAA x4 - better than vanilla
anisotropic=16        # Max texture filtering

# Performance (invisible to eyes)
fps.target=400
vsync=false
dynamic.lod=true      # Smart LOD - visually lossless
batch.rendering=true  # 70% less draw calls
gpu.instancing=true   # Vulkan-style instancing

# Memory
texture.cache=smart   # Smart caching, no quality loss
vertex.buffers=true   # Optimized vertex handling
